<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Login</title>
    <style>
        @import url(https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fira+Code:wght@400&display=swap);
        body { font-family: 'Poppins', sans-serif; background: #05070d; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .promo-hacked { border: 2px solid #00ff41; background: rgba(0, 255, 65, 0.1); padding: 20px; border-radius: 15px; text-align: center; margin-top: 50px; width: 300px; box-shadow: 0 0 20px #00ff41; }
        .hacker-btn { background: #00ff41; color: #000; border: 0; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .terminal { background: #000; border: 1px solid #00ff41; padding: 20px; width: 90%; max-width: 400px; font-family: 'Fira Code', monospace; color: #00ff41; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #00ff41; color: #00ff41; box-sizing: border-box; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="promo-hacked">
        <small>SYSTEM OVERRIDE</small>
        <h2>KES 2</h2>
        <p>19 Days | 2 Devices</p>
        <button class="hacker-btn" onclick="openTerminal()">RUN EXPLOIT</button>
    </div>

    <div id="hModal" class="modal">
        <div class="terminal">
            <div id="term-log">> Initializing...</div>
            <div id="input-step" class="hidden">
                <p>Enter M-Pesa Number:</p>
                <input type="number" id="phone" placeholder="07xxxxxxxx or 01xxxxxxxx">
                <button class="hacker-btn" onclick="sendRequest()">SEND STK PUSH</button>
            </div>
        </div>
    </div>

    <script>
        const log = document.getElementById('term-log');
        function openTerminal() {
            document.getElementById('hModal').style.display = 'flex';
            setTimeout(() => { log.innerHTML += "<br>> Bypassing Gateway..."; }, 500);
            setTimeout(() => { log.innerHTML += "<br>> Accessing Node 3345925..."; }, 1000);
            setTimeout(() => { document.getElementById('input-step').classList.remove('hidden'); }, 1500);
        }

        function sendRequest() {
            let num = document.getElementById('phone').value;
            if(!num.match(/^(07|01)\d{8}$/)) return alert("Use format 07... or 01...");
            
            // Format to 254
            let formatted = "254" + num.substring(1);
            
            log.innerHTML = "> INJECTING PAYLOAD TO " + formatted + "...";
            document.getElementById('input-step').classList.add('hidden');

            // CALLING THE PHP BRIDGE
            fetch('stk_push.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'phone=' + formatted
            })
            .then(res => res.json())
            .then(data => {
                if(data.ResponseCode == "0") {
                    log.innerHTML += "<br>> SUCCESS! ENTER PIN ON PHONE.";
                } else {
                    log.innerHTML += "<br>> FAILED: " + (data.errorMessage || "Unknown Error");
                }
            })
            .catch(err => {
                log.innerHTML += "<br>> ERROR: Check if stk_push.php exists.";
            });
        }
    </script>
</body>
</html>
